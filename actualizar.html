<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4efe6" />
    <title>Actualizar Hilo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4efe6;
        color: #231f1a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
        padding: 32px 24px;
        border: 1px solid #d7cdbd;
        border-radius: 24px;
        background: #fffdf8;
        box-shadow: 0 18px 50px rgb(62 48 30 / 12%);
        text-align: center;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: #b65331;
        color: white;
        font-size: 30px;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, serif;
        font-size: 30px;
      }

      p {
        margin: 0;
        color: #675d51;
        line-height: 1.55;
      }

      a {
        display: none;
        margin-top: 22px;
        padding: 14px 18px;
        border-radius: 999px;
        background: #231f1a;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }

      a.visible {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">&#8635;</div>
      <h1>Actualizando Hilo&hellip;</h1>
      <p id="status" role="status">Eliminando la versi&oacute;n antigua del dispositivo.</p>
      <a id="continue" href="./?actualizado=1" target="_blank" rel="noopener">Abrir la versi&oacute;n nueva en otra pestaña</a>
    </main>

    <script>
      (async () => {
        const status = document.querySelector("#status");
        const continueLink = document.querySelector("#continue");

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }

          localStorage.clear();
          sessionStorage.clear();

          status.textContent = "Limpieza completada. Pulsa el bot\\u00f3n para abrir la versi\\u00f3n nueva en otra pesta\\u00f1a.";
          continueLink.href = `./?actualizado=${Date.now()}`;
          continueLink.classList.add("visible");
        } catch (error) {
          status.textContent = "No se pudo completar autom\u00e1ticamente. Pulsa el bot\u00f3n para continuar.";
          continueLink.classList.add("visible");
        }
      })();
    </script>
  </body>
</html>
